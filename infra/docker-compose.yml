name: deshahed

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: deshahed-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deshahed}
      POSTGRES_USER: ${POSTGRES_USER:-deshahed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deshahed-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
    image: deshahed-api:dev
    container_name: deshahed-api
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deshahed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-deshahed}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deshahed-cloudflared
    # Token-based "remote" tunnel — ingress (Public Hostnames) is configured in
    # the Cloudflare dashboard, not in a local YAML. Cloudflared joins our internal
    # network so Public Hostnames can target `http://web:3000` and `http://api:8000`
    # via Docker DNS without exposing any host ports.
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped
    profiles: ["with-tunnel"]

  parser:
    build:
      context: ../services/parser
    image: deshahed-parser:dev
    container_name: deshahed-parser
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deshahed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-deshahed}
      REDIS_URL: redis://redis:6379/0
      # Compose interpolates env vars at parse time for the whole file, so a hard
      # `:?` failure here would break unrelated services. Default to empty and let
      # the poller refuse to start with a clear message (see alerts_poller.py).
      ALERTS_API_TOKEN: ${ALERTS_API_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    profiles: ["with-poller"]
    # The parser image inherits api's HEALTHCHECK (curl :8000), but this service
    # isn't uvicorn — disable so it doesn't show "unhealthy".
    healthcheck:
      test: ["NONE"]

  tg_listener:
    build:
      context: ../services/parser
    image: deshahed-parser:dev
    container_name: deshahed-tg-listener
    environment:
      APP_ENV: ${APP_ENV:-dev}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TG_CHANNELS: ${TG_CHANNELS:-}
      TG_SESSION_DIR: /sessions
    volumes:
      - tg_session:/sessions
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    profiles: ["with-tg"]
    command: ["python", "-m", "parser.tg_listener"]
    healthcheck:
      test: ["NONE"]

  llm_extractor:
    build:
      context: ../services/parser
    image: deshahed-parser:dev
    container_name: deshahed-llm-extractor
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deshahed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-deshahed}
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_FREE_MODEL: ${OPENROUTER_FREE_MODEL:-meta-llama/llama-3.2-3b-instruct:free}
      OPENROUTER_PAID_MODEL: ${OPENROUTER_PAID_MODEL:-openai/gpt-4o-mini}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    profiles: ["with-extractor"]
    command: ["python", "-m", "parser.llm_extractor"]
    healthcheck:
      test: ["NONE"]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    image: deshahed-web:dev
    container_name: deshahed-web
    environment:
      NODE_ENV: development
      # Intentionally NOT setting NEXT_PUBLIC_WS_URL here. Next inlines this var into the
      # client bundle, so a single value can't satisfy both `http://localhost:3000` and
      # `https://де-шахед.online`. Let `apps/web/src/lib/env.ts` derive it at runtime
      # from window.location. Override only if you really need a custom backend host.
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ../apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  web_node_modules:
  web_next_cache:
  tg_session:

networks:
  internal:
    name: deshahed-internal
    driver: bridge
