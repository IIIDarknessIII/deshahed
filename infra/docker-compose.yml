name: deshahed

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: deshahed-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deshahed}
      POSTGRES_USER: ${POSTGRES_USER:-deshahed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deshahed-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
    image: deshahed-api:dev
    container_name: deshahed-api
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deshahed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-deshahed}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  internal:
    name: deshahed-internal
    driver: bridge
